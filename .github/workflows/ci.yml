name: Studvisor CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check backend/ --output-format=github

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-key

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t Studvisor-erp:test .

      - name: Verify container starts
        run: |
          docker run -d -p 8000:8000 --name Studvisor-test \
            -e DATABASE_URL=sqlite:///./test.db \
            -e SECRET_KEY=ci-test-key \
            Studvisor-erp:test
          sleep 5
          curl -f http://localhost:8000/health
          docker stop Studvisor-test

